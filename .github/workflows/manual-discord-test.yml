name: Manual Discord Test

on:
  workflow_dispatch:

jobs:
  test-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}

        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL missing"
            exit 1
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\":\"Nexium Webhook\",
            \"content\":\"GitHub Actions Discord webhook working.\",
            \"embeds\":[
              {
                \"title\":\"Manual Discord Test\",
                \"description\":\"Repository: ${REPOSITORY}\nTriggered by: ${ACTOR}\",
                \"color\":3066993
              }
            ]
          }" \
          "$DISCORD_WEBHOOK_URL"
